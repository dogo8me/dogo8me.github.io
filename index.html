<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Farm Work Tracker</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <header>
        <h1>FARM WORK TRACKER</h1>
        <p class="tagline">Track time. Log work. Get paid.</p>
      </header>

      <section class="panel active-session">
        <h2>Active Session</h2>
        <div class="timer-display">
          <p class="timer" id="activeTimer">00:00:00</p>
        </div>
        <div class="form-group">
          <label for="activeNote">What are you working on?</label>
          <textarea id="activeNote" rows="3" placeholder="Feeding animals, fixing fences..."></textarea>
        </div>
        <div class="button-group">
          <button id="startBtn" class="btn btn-primary">START SESSION</button>
          <button id="stopBtn" class="btn btn-danger" disabled>END SESSION</button>
        </div>
      </section>

      <section class="panel">
        <h2>Add Historical Entry</h2>
        <div class="form-grid">
          <div class="form-group">
            <label for="historyStart">Start Date / Time</label>
            <input id="historyStart" type="datetime-local" />
          </div>
          <div class="form-group">
            <label for="historyEnd">End Date / Time</label>
            <input id="historyEnd" type="datetime-local" />
          </div>
        </div>
        <div class="form-group">
          <label for="historyNote">Notes</label>
          <textarea id="historyNote" rows="2" placeholder="What you did"></textarea>
        </div>
        <button id="addHistoryBtn" class="btn btn-secondary">ADD ENTRY</button>
      </section>

      <section class="panel">
        <h2>Summary</h2>
        <div class="summary-cards">
          <article class="summary-card">
            <p class="summary-label">Total Hours</p>
            <p class="summary-value" id="totalHours">0.00</p>
          </article>
          <article class="summary-card">
            <p class="summary-label">Money Earned</p>
            <p class="summary-value" id="totalMoney">$0.00</p>
          </article>
          <article class="summary-card">
            <p class="summary-label">Avg Hours / Day</p>
            <p class="summary-value" id="avgHours">0.00</p>
          </article>
          <article class="summary-card">
            <p class="summary-label">Total Sessions</p>
            <p class="summary-value" id="sessionCount">0</p>
          </article>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>Work Log</h2>
          <div class="button-group-horizontal">
            <button id="exportCsvBtn" class="btn btn-secondary btn-small">EXPORT CSV</button>
            <button id="printBtn" class="btn btn-secondary btn-small">PRINT</button>
            <button id="clearBtn" class="btn btn-danger btn-small">CLEAR</button>
          </div>
        </div>
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Start</th>
                <th>End</th>
                <th>Hours</th>
                <th>Notes</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="entriesBody"></tbody>
          </table>
        </div>
      </section>

      <div id="status" role="status" aria-live="polite" class="status-message"></div>
    </main>

    <script src="app.js"></script>
  </body>
</html>
